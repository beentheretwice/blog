name: Test Hugo Build
on:
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.128.0
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      # SEO Files Check
      - name: Check SEO files exist
        run: |
          echo "Checking robots.txt..."
          test -f static/robots.txt || (echo "❌ robots.txt missing" && exit 1)
          
          echo "Checking llm.txt..."
          test -f static/llm.txt || (echo "❌ llm.txt missing" && exit 1)
          
          echo "Checking navigation.json..."
          test -f static/navigation.json || (echo "❌ navigation.json missing" && exit 1)
          
          # Validate navigation.json is valid JSON
          jq empty static/navigation.json || (echo "❌ navigation.json is not valid JSON" && exit 1)
          
          echo "✅ All SEO files present and valid"
      
      # Image URL Check
      - name: Check image URLs
        run: |
          chmod +x scripts/check-images.sh
          ./scripts/check-images.sh
      
      # Build Test
      - name: Build with Hugo
        run: hugo --minify --baseURL "waqtsalat.github.io/blog/"
      
      - name: Verify build
        run: test -d public && test -f public/index.html
      
      # Post-build image URL check
      - name: Check generated image URLs
        run: |
          # Check for images missing /blog/ prefix
          WRONG_URL=$(grep -r 'src="/images/' public/ 2>/dev/null | wc -l || echo "0")
          
          if [[ "$WRONG_URL" -gt 0 ]]; then
            echo "❌ Found $WRONG_URL images with wrong URL (missing /blog/ prefix)"
            grep -r 'src="/images/' public/ | head -5
            exit 1
          fi
          
          echo "✅ All image URLs have correct /blog/ prefix"
