<div class="cta-block">
  <div class="cta-content">
    <h3>{{ .title | default "Ready to Get Started?" }}</h3>
    <p class="cta-text">{{ .text | default "Experience accurate prayer times with complete privacy." }}</p>
    <div class="cta-buttons">
      {{ with .primaryUrl }}
      <a href="{{ . }}" class="btn btn-primary">{{ $.primaryText | default "Try WaqtSalat" }}</a>
      {{ end }}
      {{ with .secondaryUrl }}
      <a href="{{ . }}" class="btn btn-secondary">{{ $.secondaryText | default "Learn More" }}</a>
      {{ end }}
    </div>
  </div>
</div>
